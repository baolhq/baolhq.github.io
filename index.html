<!DOCTYPE html>
<html>
  <head>
    <title>Redirecting...</title>
    <meta charset="utf-8" />
  </head>

  <style>
    body {
      background: linear-gradient(145deg, #333, #000);
      color: white;
    }
    div {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-family: "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS",
        sans-serif;
      background-color: #333;
      border-radius: 10px;
      border: 3px ridge springgreen;
      padding: 20px;
      box-shadow: 0px 0px 50px 20px;
    }
    h1 {
      font-size: 40px;
      font-weight: 800;
    }
    h3 {
      font-size: 25px;
      font-weight: 400;
    }
    p {
      opacity: 0.7;
    }
  </style>

  <body>
    <div>
      <h1>Đang chuyển hướng..</h1>
      <h3>Vui lòng chờ trong giây lát</h3>
      <p><em>Bạn thích uống coffee chứ :></em></p>
    </div>
  </body>
</html>
